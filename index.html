<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>RAI — Мессенджер с GigaChat</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(180deg, #2a004d, #0A0A0A);
            color: #fff;
            min-height: 100vh;
        }
        
        .app {
            width: 100%;
            min-height: 100vh;
            background: #0A0A0A;
            position: relative;
        }
        
        .screen {
            width: 100%;
            min-height: 100vh;
            background: #0A0A0A;
            display: none;
            flex-direction: column;
            position: relative;
        }
        
        .screen.active { display: flex; }
        
        .header {
            padding: 20px 20px 12px;
            background: rgba(10,10,10,0.95);
            border-bottom: 1px solid #222;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #7B5EFF;
        }
        
        .chat-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            background: rgba(10,10,10,0.95);
            border-bottom: 1px solid #222;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        .back-btn {
            background: none;
            border: none;
            color: #7B5EFF;
            font-size: 28px;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
        }
        
        .search {
            margin: 15px 20px;
            padding: 14px 20px;
            background: #1a1a1a;
            border-radius: 20px;
            border: none;
            color: #fff;
            font-size: 15px;
        }
        
        .chat-item {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            border-bottom: 1px solid #222;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .chat-item:hover { background: #1a1a1a; }
        
        .avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7B5EFF, #00D4FF);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
        }
        
        .avatar.bot {
            background: linear-gradient(135deg, #00D4FF, #7B5EFF);
            box-shadow: 0 0 10px rgba(123, 94, 255, 0.5);
        }
        
        .chat-info { flex: 1; }
        .chat-name { font-weight: 600; margin-bottom: 4px; }
        .last-msg { font-size: 13px; color: #888; }
        .time { font-size: 11px; color: #666; }
        
        .messages-area {
            flex: 1;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            min-height: calc(100vh - 120px);
        }
        
        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            word-wrap: break-word;
        }
        
        .message-user {
            background: #7B5EFF;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        
        .message-other {
            background: #1E1E2F;
            color: #f0f0f0;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        
        .message-bot {
            background: linear-gradient(135deg, #1a1a3a, #0a0a2a);
            color: #fff;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border-left: 3px solid #7B5EFF;
        }
        
        .input-bar {
            padding: 12px 16px;
            background: #0f0f0f;
            border-top: 1px solid #222;
            display: flex;
            gap: 10px;
            position: sticky;
            bottom: 0;
        }
        
        .msg-input {
            flex: 1;
            background: #1a1a1a;
            border: none;
            padding: 12px 16px;
            border-radius: 25px;
            color: white;
            font-size: 14px;
            outline: none;
        }
        
        .send-btn {
            background: #7B5EFF;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 18px;
        }
        
        .login-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px;
            gap: 20px;
        }
        
        .login-input {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 15px;
            border-radius: 12px;
            color: white;
            font-size: 16px;
        }
        
        .login-btn {
            background: linear-gradient(90deg, #7B5EFF, #00D4FF);
            padding: 15px;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 68px;
            background: rgba(17,17,17,0.98);
            border-top: 1px solid #222;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 20;
        }
        
        .nav-item {
            background: none;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #777;
            font-size: 11px;
            cursor: pointer;
        }
        
        .nav-item.active { color: #7B5EFF; }
        
        .user-badge {
            position: absolute;
            top: 15px;
            right: 20px;
            background: #7B5EFF;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
        }
        
        .online-status {
            font-size: 10px;
            color: #00ff88;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .bot-badge {
            background: #7B5EFF;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: 8px;
        }
        
        .typing {
            color: #888;
            font-size: 12px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .typing span {
            animation: typing 1.5s infinite;
        }
        
        @keyframes typing {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        
        .error-message {
            background: rgba(255, 0, 0, 0.2);
            border-left: 3px solid #ff4444;
        }
    </style>
</head>
<body>

<div class="app">
    <!-- ЭКРАН ВХОДА -->
    <div id="loginScreen" class="screen active">
        <div class="header">
            <h1>RAI</h1>
        </div>
        <div class="login-container">
            <input type="text" id="usernameInput" class="login-input" placeholder="Ваше имя" maxlength="20">
            <button onclick="login()" class="login-btn">🚀 Войти в чат</button>
            <p style="text-align: center; color: #666; font-size: 12px;">🧠 RAI работает на GigaChat от Сбера</p>
        </div>
    </div>
    
    <!-- ЭКРАН ЧАТОВ -->
    <div id="chatsScreen" class="screen">
        <div class="header">
            <h1>Чаты</h1>
            <div class="user-badge" id="userNameDisplay"></div>
        </div>
        <input type="text" id="searchChats" class="search" placeholder="Поиск чатов...">
        <div id="chatList" style="flex: 1;"></div>
        <div class="bottom-nav">
            <button class="nav-item active" onclick="showChats()">💬<br><span>Чаты</span></button>
            <button class="nav-item" onclick="showUsers()">👥<br><span>Люди</span></button>
            <button class="nav-item" onclick="showBot()">🧠<br><span>RAI</span></button>
            <button class="nav-item" onclick="logout()">🚪<br><span>Выйти</span></button>
        </div>
    </div>
    
    <!-- ЭКРАН ДИАЛОГА -->
    <div id="chatScreen" class="screen">
        <div class="chat-header">
            <button class="back-btn" onclick="backToChats()">←</button>
            <div class="chat-info">
                <div class="chat-name" id="activeChatName"></div>
                <div class="online-status" id="activeChatStatus">онлайн</div>
            </div>
        </div>
        <div class="messages-area" id="messagesContainer"></div>
        <div class="input-bar">
            <input type="text" class="msg-input" id="messageInput" placeholder="Сообщение...">
            <button class="send-btn" onclick="sendMessage()">📤</button>
        </div>
    </div>
    
    <!-- ЭКРАН ПОЛЬЗОВАТЕЛЕЙ -->
    <div id="usersScreen" class="screen">
        <div class="header">
            <h1>Пользователи</h1>
        </div>
        <div id="usersList" style="flex: 1; padding: 20px;"></div>
        <div class="bottom-nav">
            <button class="nav-item" onclick="showChats()">💬<br><span>Чаты</span></button>
            <button class="nav-item active" onclick="showUsers()">👥<br><span>Люди</span></button>
            <button class="nav-item" onclick="showBot()">🧠<br><span>RAI</span></button>
            <button class="nav-item" onclick="logout()">🚪<br><span>Выйти</span></button>
        </div>
    </div>
</div>

<script>
    // ============== GigaChat API КЛЮЧ ==============
    const GIGACHAT_CREDENTIALS = "MDE5ZGNiMGMtYjU2OS03ODkwLWI2NWMtM2IzNjA1NzdiOGI1Ojk1MGFmZGQwLTY4MjktNDMzMy05YTEwLTEyY2IyZTM3NmQyMA==";
    
    // Бот RAI
    const RAI_BOT = {
        id: 'rai_bot',
        name: '🧠 RAI (GigaChat)',
        isBot: true
    };
    
    // Хранилище данных
    let currentUser = null;
    let currentChat = null;
    let allUsers = [];
    let allMessages = {};
    let gigaToken = null;
    
    // Загрузка/сохранение
    function loadData() {
        const savedUsers = localStorage.getItem('rai_users');
        const savedMessages = localStorage.getItem('rai_messages');
        
        if (savedUsers) {
            allUsers = JSON.parse(savedUsers);
        } else {
            allUsers = [
                { id: 'user1', name: 'Алексей', online: true },
                { id: 'user2', name: 'Марина', online: false },
                RAI_BOT
            ];
            saveUsers();
        }
        
        if (savedMessages) {
            allMessages = JSON.parse(savedMessages);
        } else {
            allMessages = {};
        }
    }
    
    function saveUsers() {
        localStorage.setItem('rai_users', JSON.stringify(allUsers));
    }
    
    function saveMessages() {
        localStorage.setItem('rai_messages', JSON.stringify(allMessages));
    }
    
    function getChatKey(userId1, userId2) {
        return [userId1, userId2].sort().join('_');
    }
    
    // ============== GigaChat API ==============
    async function getGigaToken() {
        try {
            const response = await fetch('https://ngw.devices.sberbank.ru:9443/api/v2/oauth', {
                method: 'POST',
                headers: {
                    'Authorization': `Basic ${GIGACHAT_CREDENTIALS}`,
                    'RqUID': crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(),
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: 'scope=GIGACHAT_API_PERS'
            });
            
            if (!response.ok) {
                throw new Error(`Ошибка получения токена: ${response.status}`);
            }
            
            const data = await response.json();
            return data.access_token;
        } catch (error) {
            console.error('GigaChat token error:', error);
            return null;
        }
    }
    
    async function askGigaChat(question) {
        try {
            // Получаем токен, если его нет
            if (!gigaToken) {
                gigaToken = await getGigaToken();
            }
            
            if (!gigaToken) {
                return "❌ Не удалось подключиться к GigaChat. Проверьте API ключ.";
            }
            
            const response = await fetch('https://gigachat.devices.sberbank.ru/api/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${gigaToken}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: "GigaChat",
                    messages: [
                        {
                            role: "system",
                            content: "Ты - RAI, дружелюбный и умный ИИ-ассистент. Отвечай кратко, понятно и по-русски. Будь полезным и вежливым."
                        },
                        {
                            role: "user",
                            content: question
                        }
                    ],
                    temperature: 0.7,
                    max_tokens: 500
                })
            });
            
            if (response.status === 401) {
                // Токен просрочен, обновляем
                gigaToken = await getGigaToken();
                return askGigaChat(question);
            }
            
            if (!response.ok) {
                throw new Error(`GigaChat API error: ${response.status}`);
            }
            
            const data = await response.json();
            return data.choices[0].message.content;
            
        } catch (error) {
            console.error('GigaChat error:', error);
            return "🤔 Извините, произошла ошибка при обращении к GigaChat. Попробуйте позже.";
        }
    }
    
    async function botReply(chatKey, userMessage) {
        // Показываем "печатает"
        const container = document.getElementById('messagesContainer');
        if (container && currentChat && getChatKey(currentUser.id, currentChat.id) === chatKey) {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = '🧠 RAI (GigaChat) печатает<span>.</span><span>.</span><span>.</span>';
            container.appendChild(typingDiv);
            container.scrollTop = container.scrollHeight;
        }
        
        // Запрос к GigaChat
        const replyText = await askGigaChat(userMessage.text);
        
        // Убираем "печатает"
        const typingElem = document.getElementById('typingIndicator');
        if (typingElem) typingElem.remove();
        
        const botMessage = {
            id: Date.now(),
            text: replyText,
            senderId: RAI_BOT.id,
            senderName: RAI_BOT.name,
            time: Date.now()
        };
        
        if (!allMessages[chatKey]) allMessages[chatKey] = [];
        allMessages[chatKey].push(botMessage);
        saveMessages();
        
        if (currentChat && getChatKey(currentUser.id, currentChat.id) === chatKey) {
            renderMessages();
        }
        renderChatList();
    }
    
    function addMessage(chatKey, message) {
        if (!allMessages[chatKey]) allMessages[chatKey] = [];
        allMessages[chatKey].push(message);
        saveMessages();
        
        if (chatKey.includes(RAI_BOT.id) && message.senderId !== RAI_BOT.id) {
            setTimeout(() => botReply(chatKey, message), 500);
        }
    }
    
    // Вход
    function login() {
        const name = document.getElementById('usernameInput').value.trim();
        if (!name) {
            alert('Введите имя');
            return;
        }
        
        let user = allUsers.find(u => u.name === name);
        if (!user) {
            user = { id: 'user_' + Date.now(), name: name, online: true };
            allUsers.push(user);
            saveUsers();
        }
        
        currentUser = user;
        document.getElementById('userNameDisplay').innerText = currentUser.name;
        
        document.getElementById('loginScreen').classList.remove('active');
        document.getElementById('chatsScreen').classList.add('active');
        
        renderChatList();
        renderUsersList();
    }
    
    function logout() {
        currentUser = null;
        currentChat = null;
        document.getElementById('chatsScreen').classList.remove('active');
        document.getElementById('chatScreen').classList.remove('active');
        document.getElementById('usersScreen').classList.remove('active');
        document.getElementById('loginScreen').classList.add('active');
        document.getElementById('usernameInput').value = '';
    }
    
    function renderChatList() {
        const container = document.getElementById('chatList');
        const otherUsers = allUsers.filter(u => u.id !== currentUser?.id);
        
        if (otherUsers.length === 0) {
            container.innerHTML = '<div class="loading">Нет чатов<br>Нажмите на иконку 🧠, чтобы поговорить с RAI</div>';
            return;
        }
        
        container.innerHTML = otherUsers.map(user => {
            const chatKey = getChatKey(currentUser.id, user.id);
            const messages = allMessages[chatKey] || [];
            const lastMsg = messages.length > 0 ? messages[messages.length-1].text : 'Начать диалог';
            const isBot = user.isBot;
            
            return `
                <div class="chat-item" onclick="openChat('${user.id}', '${user.name}', ${isBot})">
                    <div class="avatar ${isBot ? 'bot' : ''}">${user.name[0]}</div>
                    <div class="chat-info">
                        <div class="chat-name">${user.name} ${isBot ? '<span class="bot-badge">GigaChat</span>' : ''}</div>
                        <div class="last-msg">${lastMsg.slice(0, 40)}</div>
                    </div>
                    <div class="time">${user.online ? '🟢' : '⚫'}</div>
                </div>
            `;
        }).join('');
    }
    
    function renderUsersList() {
        const otherUsers = allUsers.filter(u => u.id !== currentUser?.id && !u.isBot);
        const container = document.getElementById('usersList');
        
        if (otherUsers.length === 0) {
            container.innerHTML = '<div class="loading">Нет других пользователей<br>Но есть RAI на GigaChat! Нажмите 🧠 в меню</div>';
            return;
        }
        
        container.innerHTML = otherUsers.map(user => `
            <div class="chat-item" onclick="openChat('${user.id}', '${user.name}', false)">
                <div class="avatar">${user.name[0]}</div>
                <div class="chat-info">
                    <div class="chat-name">${user.name}</div>
                    <div class="last-msg">${user.online ? '🟢 Онлайн' : '⚫ Был недавно'}</div>
                </div>
            </div>
        `).join('');
    }
    
    function openChat(userId, userName, isBot) {
        currentChat = { id: userId, name: userName, isBot: isBot };
        
        document.getElementById('chatsScreen').classList.remove('active');
        document.getElementById('chatScreen').classList.add('active');
        document.getElementById('activeChatName').innerHTML = userName + (isBot ? ' <span class="bot-badge">GigaChat</span>' : '');
        document.getElementById('activeChatStatus').innerText = isBot ? '🧠 Нейросеть GigaChat' : 'онлайн';
        
        renderMessages();
    }
    
    function renderMessages() {
        if (!currentChat || !currentUser) return;
        
        const chatKey = getChatKey(currentUser.id, currentChat.id);
        const messages = allMessages[chatKey] || [];
        
        const container = document.getElementById('messagesContainer');
        
        if (messages.length === 0) {
            container.innerHTML = '<div class="loading">Нет сообщений<br>Напишите что-нибудь</div>';
            return;
        }
        
        container.innerHTML = messages.map(msg => {
            let messageClass = 'message-other';
            if (msg.senderId === currentUser.id) {
                messageClass = 'message-user';
            } else if (msg.senderId === RAI_BOT.id) {
                messageClass = 'message-bot';
            }
            
            return `
                <div class="message ${messageClass}">
                    <strong>${msg.senderName}:</strong> ${msg.text}
                    <div style="font-size: 10px; opacity: 0.6; margin-top: 4px;">${new Date(msg.time).toLocaleTimeString()}</div>
                </div>
            `;
        }).join('');
        
        container.scrollTop = container.scrollHeight;
    }
    
    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text || !currentChat || !currentUser) return;
        
        const chatKey = getChatKey(currentUser.id, currentChat.id);
        
        const message = {
            id: Date.now(),
            text: text,
            senderId: currentUser.id,
            senderName: currentUser.name,
            time: Date.now()
        };
        
        addMessage(chatKey, message);
        
        input.value = '';
        renderMessages();
        renderChatList();
    }
    
    function showUsers() {
        document.getElementById('chatsScreen').classList.remove('active');
        document.getElementById('usersScreen').classList.add('active');
        renderUsersList();
    }
    
    function showChats() {
        document.getElementById('usersScreen').classList.remove('active');
        document.getElementById('chatScreen').classList.remove('active');
        document.getElementById('chatsScreen').classList.add('active');
        renderChatList();
    }
    
    function showBot() {
        openChat(RAI_BOT.id, RAI_BOT.name, true);
    }
    
    function backToChats() {
        document.getElementById('chatScreen').classList.remove('active');
        document.getElementById('chatsScreen').classList.add('active');
        currentChat = null;
        renderChatList();
    }
    
    // Инициализация
    loadData();
    
    document.addEventListener('DOMContentLoaded', () => {
        const searchInput = document.getElementById('searchChats');
        if (searchInput) {
            searchInput.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                const items = document.querySelectorAll('#chatList .chat-item');
                items.forEach(item => {
                    const name = item.querySelector('.chat-name')?.innerText.toLowerCase() || '';
                    item.style.display = name.includes(term) ? 'flex' : 'none';
                });
            });
        }
        
        document.getElementById('messageInput')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    });
</script>

</body>
</html>
